<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ISEKAI · ZEE5 Player</title>
    <!-- HLS.js & DASH.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dashjs@4.5.0/dist/dash.all.min.js"></script>
    <!-- YouTube-style UI -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/player.style/yt/+esm"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0a0c14;
            font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height:100vh;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            color:#e0e7ff;
            user-select:none;
        }
        .top-bar {
            padding:6px 14px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            background:rgba(0,0,0,0.6);
            border-bottom:1px solid rgba(255,255,255,0.05);
            flex-shrink:0;
            flex-wrap:wrap;
            gap:4px 10px;
            z-index:10;
            min-height:44px;
        }
        .top-bar .brand {
            display:flex;
            align-items:center;
            gap:6px;
            color:#e0e7ff;
            font-weight:700;
            font-size:16px;
        }
        .brand i {
            font-style:normal;
            background:linear-gradient(135deg, #a78bfa, #6366f1);
            padding:2px 10px;
            border-radius:30px;
            font-size:11px;
            color:#0a0c14;
        }
        .top-controls {
            display:flex;
            align-items:center;
            gap:4px;
            flex-wrap:wrap;
        }
        .top-controls button {
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.08);
            color:#c8d0e8;
            padding:3px 12px;
            border-radius:20px;
            font-size:11px;
            font-weight:600;
            cursor:pointer;
            outline:none;
            min-height:28px;
            background:#1a1f2e;
            font-family:inherit;
        }
        .top-controls button:hover { background:#2a2f42; }
        .top-controls .proxy-btn.active {
            background:#2563eb;
            border-color:#3b82f6;
            color:#fff;
        }
        .top-controls .proxy-status {
            font-size:10px;
            color:#8b95b5;
            min-width:18px;
        }
        .main-area {
            flex:1;
            display:flex;
            overflow:hidden;
            position:relative;
        }
        .player-wrapper {
            flex:1;
            display:flex;
            flex-direction:column;
            background:#07090e;
            position:relative;
            min-width:0;
        }
        .video-container {
            flex:1;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0a0c14;
            overflow:hidden;
        }
        .video-container media-theme-yt {
            width:100%;
            height:100%;
            display:block;
            --media-primary-color:#FF5722;
            --media-text-color:#fff;
            --media-background-color:#000;
        }
        .video-container video {
            width:100%;
            height:100%;
            object-fit:contain;
            background:#0a0c14;
            display:block;
        }
        video::-webkit-media-controls { display:none !important; }
        .fit-controls {
            display:flex;
            justify-content:center;
            gap:10px;
            padding:6px 0;
            background:rgba(0,0,0,0.4);
            border-top:1px solid rgba(255,255,255,0.03);
            flex-shrink:0;
        }
        .fit-controls button {
            background:#1a1f2e;
            border:1px solid rgba(255,255,255,0.08);
            color:#c8d0e8;
            padding:4px 16px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
            cursor:pointer;
            font-family:inherit;
        }
        .fit-controls button:hover { background:#2a2f42; }
        .fit-controls button.active {
            background:#FF5722;
            border-color:#FF5722;
            color:#fff;
            box-shadow:0 0 12px rgba(255,87,34,0.3);
        }
        .loading-overlay {
            position:absolute;
            top:0; left:0; right:0; bottom:0;
            display:none;
            align-items:center;
            justify-content:center;
            background:rgba(0,0,0,0.3);
            z-index:20;
            pointer-events:none;
        }
        .loading-overlay.show { display:flex; }
        .spinner {
            width:32px;
            height:32px;
            border:3px solid rgba(255,255,255,0.1);
            border-top-color:#6366f1;
            border-radius:50%;
            animation:spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .status-msg {
            position:absolute;
            bottom:60px;
            left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,0.7);
            padding:4px 16px;
            border-radius:30px;
            color:#c8d0e8;
            font-size:12px;
            border:1px solid rgba(255,255,255,0.04);
            pointer-events:none;
            opacity:0;
            transition:opacity 0.2s;
            white-space:nowrap;
            z-index:30;
        }
        .status-msg.show { opacity:1; }
        .right-sidebar {
            width:300px;
            max-width:35vw;
            background:rgba(10,13,24,0.94);
            border-left:1px solid rgba(255,255,255,0.05);
            display:flex;
            flex-direction:column;
            overflow:hidden;
            flex-shrink:0;
        }
        .sidebar-header {
            padding:6px 12px;
            border-bottom:1px solid rgba(255,255,255,0.05);
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex-shrink:0;
        }
        .sidebar-header span {
            color:#c8d0e8;
            font-size:13px;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:6px;
        }
        .sidebar-header .badge {
            background:#6366f1;
            color:#fff;
            border-radius:20px;
            padding:0 8px;
            font-size:11px;
        }
        .sidebar-header .close-btn {
            background:none;
            border:none;
            color:#8b95b5;
            font-size:18px;
            cursor:pointer;
            padding:0 4px;
            display:none;
        }
        .search-box {
            padding:4px 12px 8px 12px;
            border-bottom:1px solid rgba(255,255,255,0.04);
            flex-shrink:0;
        }
        .search-box input {
            width:100%;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:30px;
            padding:6px 14px;
            color:#e0e7ff;
            font-size:12px;
            outline:none;
            font-family:inherit;
        }
        .search-box input::placeholder { color:#6b7a9a; }
        .search-box input:focus { border-color:#6366f1; }
        .channel-list-wrap {
            flex:1;
            overflow-y:auto;
            padding:4px 0 12px 0;
            -webkit-overflow-scrolling:touch;
        }
        .channel-list-wrap::-webkit-scrollbar { width:3px; }
        .channel-list-wrap::-webkit-scrollbar-track { background:transparent; }
        .channel-list-wrap::-webkit-scrollbar-thumb { background:#3b4466; border-radius:8px; }
        .category-group { margin-bottom:4px; }
        .category-title {
            padding:2px 12px;
            font-size:10px;
            text-transform:uppercase;
            letter-spacing:0.8px;
            color:#818cf8;
            font-weight:600;
            background:rgba(99,102,241,0.05);
            border-bottom:1px solid rgba(255,255,255,0.02);
            padding-top:8px;
            padding-bottom:2px;
        }
        .channel-item {
            padding:4px 12px;
            margin:1px 6px;
            border-radius:6px;
            color:#c8d0e8;
            font-size:12px;
            font-weight:500;
            cursor:pointer;
            transition:background 0.1s;
            border-left:2px solid transparent;
            display:flex;
            align-items:center;
            gap:6px;
            white-space:nowrap;
            overflow:hidden;
        }
        .channel-item:hover { background:rgba(255,255,255,0.06); color:#fff; border-left-color:#818cf8; }
        .channel-item.active { background:rgba(99,102,241,0.15); color:#fff; border-left-color:#818cf8; }
        .channel-item .ch-logo {
            width:20px;
            height:20px;
            border-radius:4px;
            background:#1a1f2e;
            object-fit:cover;
            flex-shrink:0;
        }
        .channel-item .ch-name { flex:1; overflow:hidden; text-overflow:ellipsis; }
        .toggle-channels {
            position:absolute;
            bottom:16px;
            right:16px;
            z-index:40;
            background:rgba(0,0,0,0.6);
            border:1px solid rgba(255,255,255,0.08);
            color:#e0e7ff;
            padding:8px 14px;
            border-radius:30px;
            font-weight:600;
            font-size:13px;
            display:none;
            align-items:center;
            gap:6px;
            cursor:pointer;
            font-family:inherit;
        }
        .toggle-channels .badge { background:#6366f1; color:#fff; border-radius:20px; padding:0 8px; font-size:11px; }
        .status-bar {
            padding:4px 16px;
            background:rgba(0,0,0,0.4);
            border-top:1px solid rgba(255,255,255,0.03);
            font-size:11px;
            color:#8b95b5;
            display:flex;
            justify-content:space-between;
            flex-shrink:0;
        }
        .manual-input {
            padding:6px 12px;
            background:rgba(0,0,0,0.3);
            border-top:1px solid rgba(255,255,255,0.05);
            display:flex;
            gap:8px;
            flex-shrink:0;
        }
        .manual-input input {
            flex:1;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:4px 12px;
            color:#e0e7ff;
            font-size:12px;
            outline:none;
            font-family:inherit;
        }
        .manual-input input::placeholder { color:#6b7a9a; }
        .manual-input input:focus { border-color:#6366f1; }
        .manual-input button {
            background:#2563eb;
            border:none;
            color:#fff;
            padding:4px 16px;
            border-radius:20px;
            font-weight:600;
            font-size:12px;
            cursor:pointer;
            font-family:inherit;
        }
        .manual-input button:hover { background:#3b82f6; }
        @media (max-width:700px) {
            .right-sidebar {
                position:absolute;
                top:0;
                right:0;
                bottom:0;
                width:280px;
                max-width:75vw;
                transform:translateX(105%);
                transition:transform 0.25s ease;
                z-index:50;
                border-left:1px solid rgba(255,255,255,0.1);
                background:rgba(10,13,24,0.95);
                box-shadow:-8px 0 30px rgba(0,0,0,0.6);
            }
            .right-sidebar.open { transform:translateX(0); }
            .toggle-channels { display:flex; }
            .sidebar-header .close-btn { display:block; }
            .top-controls button { font-size:10px; padding:2px 10px; min-height:24px; }
            .top-bar { padding:4px 8px; }
            .brand i { font-size:10px; }
            .status-msg { bottom:70px; font-size:11px; }
            .manual-input { flex-direction:column; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="brand"><span>⚡ISEKAI</span><i>ZEE5</i></div>
        <div class="top-controls">
            <button class="proxy-btn" id="proxyToggle">🔀Proxy</button>
            <span class="proxy-status" id="proxyStatus">off</span>
            <select id="aspectSelect"><option value="default">Aspect</option><option value="16-9">16:9</option><option value="4-3">4:3</option><option value="21-9">21:9</option></select>
        </div>
    </div>

    <div class="main-area">
        <div class="player-wrapper">
            <div class="video-container" id="videoContainer">
                <media-theme-yt>
                    <video id="videoPlayer" slot="media" playsinline crossorigin="anonymous" autoplay muted></video>
                </media-theme-yt>
                <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
                <div class="status-msg" id="statusMsg">Ready</div>
                <button class="toggle-channels" id="channelToggle">📺 Channels <span class="badge" id="channelCountMobile">0</span></button>
            </div>
            <div class="fit-controls">
                <button class="fit-button active" data-fit="contain">Fit</button>
                <button class="fit-button" data-fit="cover">Fill</button>
                <button class="fit-button" data-fit="fill">Stretch</button>
            </div>
        </div>
        <div class="right-sidebar" id="rightSidebar">
            <div class="sidebar-header">
                <span>📺 Channels <span class="badge" id="channelCount">0</span></span>
                <button class="close-btn" id="closeSidebar">✕</button>
            </div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search…" autocomplete="off"></div>
            <div class="channel-list-wrap" id="channelListWrap"><div id="channelList"></div></div>
        </div>
    </div>

    <!-- Manual input bar -->
    <div class="manual-input" id="manualInput">
        <input type="text" id="manualUrl" placeholder="Or paste any stream URL (m3u8, mpd, mp4, ts)…">
        <button id="manualPlayBtn">▶ Play</button>
    </div>

    <div class="status-bar">
        <span id="statusMsgBar">Ready</span>
        <span id="channelCountBar">0 channels</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── CONFIG ───────────────────────────────────────────
            const PLAYLIST_URL = 'https://servertvhub.site/zee5/playlist.php';
            const PROXY_LIST = [
                'https://demonji.onrender.com/cors-proxy.php?url=',
                'https://corsproxy.io/?url=',
                'https://api.codetabs.com/v1/proxy/?quest='
            ];

            // ─── STATE ────────────────────────────────────────────
            let allChannels = [];
            let filteredChannels = [];
            let currentChannel = null;
            let proxyEnabled = false;
            let loading = false;
            let hls = null;
            let dashInstance = null;

            // ─── DOM REFS ────────────────────────────────────────
            const video = document.getElementById('videoPlayer');
            const channelListEl = document.getElementById('channelList');
            const channelToggle = document.getElementById('channelToggle');
            const closeSidebar = document.getElementById('closeSidebar');
            const channelCount = document.getElementById('channelCount');
            const channelCountMobile = document.getElementById('channelCountMobile');
            const channelCountBar = document.getElementById('channelCountBar');
            const statusMsg = document.getElementById('statusMsg');
            const statusMsgBar = document.getElementById('statusMsgBar');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const proxyToggle = document.getElementById('proxyToggle');
            const proxyStatus = document.getElementById('proxyStatus');
            const searchInput = document.getElementById('searchInput');
            const fitButtons = document.querySelectorAll('.fit-button');
            const rightSidebar = document.getElementById('rightSidebar');
            const manualUrl = document.getElementById('manualUrl');
            const manualPlayBtn = document.getElementById('manualPlayBtn');
            const aspectSelect = document.getElementById('aspectSelect');

            let statusTimeout = null;

            // ─── HELPERS ──────────────────────────────────────────
            function setStatus(text, duration = 3000) {
                statusMsg.textContent = text;
                statusMsg.classList.add('show');
                statusMsgBar.textContent = text;
                if (statusTimeout) clearTimeout(statusTimeout);
                if (duration > 0) statusTimeout = setTimeout(() => {
                    statusMsg.classList.remove('show');
                }, duration);
            }

            function setLoading(show) {
                loading = show;
                loadingOverlay.classList.toggle('show', show);
            }

            function getProxiedUrl(rawUrl, proxyIdx) {
                if (!proxyEnabled) return rawUrl;
                const base = PROXY_LIST[proxyIdx] || PROXY_LIST[0];
                return base + encodeURIComponent(rawUrl);
            }

            // ─── FETCH WITH PROXY FALLBACK ──────────────────────
            async function fetchWithFallback(url) {
                // Direct
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
                    if (res.ok) {
                        const text = await res.text();
                        return { text, proxyUsed: 'direct' };
                    }
                } catch (e) {}

                // Proxies (only if proxy is enabled)
                if (proxyEnabled) {
                    for (let i = 0; i < PROXY_LIST.length; i++) {
                        try {
                            const pUrl = PROXY_LIST[i] + encodeURIComponent(url);
                            const res = await fetch(pUrl, { signal: AbortSignal.timeout(8000) });
                            if (res.ok) {
                                const text = await res.text();
                                return { text, proxyUsed: 'proxy' + (i + 1) };
                            }
                        } catch (e) {}
                    }
                }
                throw new Error('All fetch attempts failed');
            }

            // ─── PARSE PLAYLIST ──────────────────────────────────
            function parsePlaylist(text) {
                try {
                    const data = JSON.parse(text);
                    if (Array.isArray(data) && data.length) {
                        // Look for the exact fields: title, image_url, video_token
                        if (data[0].title !== undefined && data[0].video_token !== undefined) {
                            return data.map(item => ({
                                name: item.title || 'Unknown',
                                url: item.video_token || '',
                                logo: item.image_url || '',
                                category: 'ZEE5'
                            })).filter(ch => ch.url);
                        }
                        // Generic fallback
                        return data.map(item => ({
                            name: item.title || item.name || 'Unknown',
                            url: item.video_token || item.url || '',
                            logo: item.image_url || item.logo || '',
                            category: item.category || 'Uncategorized'
                        })).filter(ch => ch.url);
                    }
                } catch (e) {}
                return null;
            }

            // ─── LOAD PLAYLIST ───────────────────────────────────
            async function loadPlaylist() {
                try {
                    setStatus('Loading playlist…', 0);
                    const { text, proxyUsed } = await fetchWithFallback(PLAYLIST_URL);
                    const parsed = parsePlaylist(text);
                    if (!parsed || parsed.length === 0) {
                        setStatus('No channels found.', 5000);
                        return;
                    }
                    allChannels = parsed;
                    filteredChannels = [...allChannels];
                    renderChannels(filteredChannels);
                    const count = allChannels.length;
                    channelCount.textContent = count;
                    channelCountMobile.textContent = count;
                    channelCountBar.textContent = count + ' channels';
                    setStatus(`Loaded ${count} channels (${proxyUsed})`, 3000);
                } catch (e) {
                    setStatus('Playlist load failed: ' + e.message, 6000);
                    console.error(e);
                }
            }

            // ─── RENDER CHANNELS ────────────────────────────────
            function renderChannels(channels) {
                const groups = {};
                for (const ch of channels) {
                    const cat = ch.category || 'Uncategorized';
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(ch);
                }
                let html = '';
                for (const [cat, items] of Object.entries(groups)) {
                    html += `<div class="category-group"><div class="category-title">${cat}</div>`;
                    for (const ch of items) {
                        const logoHtml = ch.logo ? `<img class="ch-logo" src="${ch.logo}" alt="" loading="lazy" onerror="this.style.display='none'">` : `<span class="ch-logo" style="background:#1f2740;display:inline-flex;align-items:center;justify-content:center;font-size:9px;">📡</span>`;
                        html += `<div class="channel-item" data-url="${ch.url}" data-name="${ch.name}">
                            ${logoHtml}
                            <span class="ch-name">${ch.name}</span>
                        </div>`;
                    }
                    html += '</div>';
                }
                channelListEl.innerHTML = html;

                document.querySelectorAll('.channel-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const url = this.dataset.url;
                        const name = this.dataset.name;
                        if (!url) return setStatus('No stream URL', 3000);
                        document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        playChannel(url, name);
                        if (window.innerWidth < 700) rightSidebar.classList.remove('open');
                    });
                });
            }

            // ─── RESOLVE STREAM URL FROM TOKEN ──────────────────
            async function resolveStreamUrl(tokenUrl) {
                try {
                    let fetchUrl = tokenUrl;
                    if (proxyEnabled) {
                        fetchUrl = getProxiedUrl(tokenUrl, 0);
                    }
                    const resp = await fetch(fetchUrl);
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.text();

                    // Look for a stream URL in the response
                    // Common patterns: .m3u8, .mpd, .mp4, .ts
                    const urlMatch = data.match(/https?:\/\/[^\s"']+\.(m3u8|mpd|mp4|ts|m3u)/i);
                    if (urlMatch) {
                        return urlMatch[0];
                    }

                    // If the response itself looks like a manifest, treat the token URL as the stream
                    if (data.trim().startsWith('#EXTM3U') || data.trim().startsWith('<MPD')) {
                        return tokenUrl;
                    }

                    // Try to parse as JSON (some tokens return JSON with stream URL)
                    try {
                        const json = JSON.parse(data);
                        if (json.url) return json.url;
                        if (json.stream_url) return json.stream_url;
                        if (json.video_url) return json.video_url;
                    } catch (e) {}

                    // Fallback: return the token URL itself (may work if it's a direct manifest)
                    return tokenUrl;
                } catch (e) {
                    console.warn('Token fetch failed, using token as URL:', e);
                    return tokenUrl;
                }
            }

            // ─── PLAY CHANNEL ────────────────────────────────────
            async function playChannel(tokenUrl, name) {
                // Clean up previous players
                if (hls) { hls.destroy(); hls = null; }
                if (dashInstance) { dashInstance.destroy(); dashInstance = null; }
                video.pause();
                video.removeAttribute('src');
                video.load();

                currentChannel = { url: tokenUrl, name };
                setLoading(true);
                setStatus(`Resolving ${name}…`, 0);

                try {
                    // Resolve the actual stream URL from the token
                    const streamUrl = await resolveStreamUrl(tokenUrl);
                    console.log('Resolved stream URL:', streamUrl);

                    // Determine format
                    const lower = streamUrl.toLowerCase();
                    const isMpd = lower.includes('.mpd') || lower.includes('mpd');

                    if (isMpd) {
                        // DASH
                        if (typeof dashjs === 'undefined') {
                            setStatus('DASH.js not loaded.', 5000);
                            setLoading(false);
                            return;
                        }
                        dashInstance = dashjs.MediaPlayer().create();
                        dashInstance.initialize(video, streamUrl, true);
                        dashInstance.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
                            setLoading(false);
                            setStatus(`Playing ${name} (DASH)`, 2500);
                        });
                        dashInstance.on(dashjs.MediaPlayer.events.ERROR, (e) => {
                            console.error('DASH error:', e);
                            setStatus('DASH error: ' + (e.error?.message || 'unknown'), 5000);
                            setLoading(false);
                        });
                    } else {
                        // HLS (m3u8, ts, mp4)
                        if (Hls.isSupported()) {
                            hls = new Hls({
                                enableWorker: true,
                                lowLatencyMode: false,
                                backbufferLength: 2,
                                maxBufferLength: 4,
                                abrBandWidthFactor: 0.9,
                                startLevel: -1,
                                xhrSetup: (xhr, xhrUrl) => {
                                    if (proxyEnabled) {
                                        if (!xhrUrl.includes('demonji.onrender.com') && !xhrUrl.includes('corsproxy.io')) {
                                            const proxied = getProxiedUrl(xhrUrl, 0);
                                            xhr.open('GET', proxied, true);
                                        }
                                    }
                                }
                            });
                            hls.loadSource(streamUrl);
                            hls.attachMedia(video);
                            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                                setLoading(false);
                                setStatus(`Playing ${name} (HLS)`, 2500);
                            });
                            hls.on(Hls.Events.ERROR, (event, data) => {
                                if (data.fatal) {
                                    console.error('HLS fatal error:', data);
                                    setStatus('HLS error: ' + (data.type || 'unknown'), 5000);
                                    setLoading(false);
                                }
                            });
                            video.play().catch(() => {});
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = streamUrl;
                            video.play().then(() => {
                                setLoading(false);
                                setStatus(`Playing ${name} (native)`, 2500);
                            }).catch((e) => {
                                setStatus('Native play error: ' + e.message, 5000);
                                setLoading(false);
                            });
                        } else {
                            setStatus('HLS not supported.', 5000);
                            setLoading(false);
                        }
                    }
                } catch (e) {
                    setStatus('Failed to resolve stream: ' + e.message, 5000);
                    setLoading(false);
                }
            }

            // ─── MANUAL PLAY ─────────────────────────────────────
            manualPlayBtn.addEventListener('click', function() {
                const url = manualUrl.value.trim();
                if (!url) return setStatus('Please enter a URL', 3000);
                // Treat as direct stream URL, no token resolution
                // We'll play it directly
                if (hls) { hls.destroy(); hls = null; }
                if (dashInstance) { dashInstance.destroy(); dashInstance = null; }
                video.pause();
                video.removeAttribute('src');
                video.load();

                const lower = url.toLowerCase();
                const isMpd = lower.includes('.mpd') || lower.includes('mpd');
                let streamUrl = proxyEnabled ? getProxiedUrl(url, 0) : url;

                setLoading(true);
                setStatus('Playing manual stream…', 0);

                if (isMpd) {
                    if (typeof dashjs === 'undefined') {
                        setStatus('DASH.js not loaded.', 5000);
                        setLoading(false);
                        return;
                    }
                    dashInstance = dashjs.MediaPlayer().create();
                    dashInstance.initialize(video, streamUrl, true);
                    dashInstance.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
                        setLoading(false);
                        setStatus('Playing DASH stream', 2500);
                    });
                    dashInstance.on(dashjs.MediaPlayer.events.ERROR, (e) => {
                        console.error('DASH error:', e);
                        setStatus('DASH error: ' + (e.error?.message || 'unknown'), 5000);
                        setLoading(false);
                    });
                } else {
                    if (Hls.isSupported()) {
                        hls = new Hls({
                            enableWorker: true,
                            lowLatencyMode: false,
                            xhrSetup: (xhr, xhrUrl) => {
                                if (proxyEnabled) {
                                    if (!xhrUrl.includes('demonji.onrender.com') && !xhrUrl.includes('corsproxy.io')) {
                                        const proxied = getProxiedUrl(xhrUrl, 0);
                                        xhr.open('GET', proxied, true);
                                    }
                                }
                            }
                        });
                        hls.loadSource(streamUrl);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            setLoading(false);
                            setStatus('Playing HLS stream', 2500);
                        });
                        hls.on(Hls.Events.ERROR, (event, data) => {
                            if (data.fatal) {
                                setStatus('HLS error: ' + (data.type || 'unknown'), 5000);
                                setLoading(false);
                            }
                        });
                        video.play().catch(() => {});
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = streamUrl;
                        video.play().then(() => {
                            setLoading(false);
                            setStatus('Playing native stream', 2500);
                        }).catch((e) => {
                            setStatus('Native play error: ' + e.message, 5000);
                            setLoading(false);
                        });
                    } else {
                        setStatus('HLS not supported.', 5000);
                        setLoading(false);
                    }
                }
            });

            manualUrl.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') manualPlayBtn.click();
            });

            // ─── FIT BUTTONS ────────────────────────────────────
            fitButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const fit = this.dataset.fit;
                    video.style.objectFit = fit;
                    fitButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // ─── SEARCH ──────────────────────────────────────────
            function filterChannels(query) {
                const q = query.trim().toLowerCase();
                if (!q) filteredChannels = [...allChannels];
                else filteredChannels = allChannels.filter(ch => ch.name.toLowerCase().includes(q));
                renderChannels(filteredChannels);
            }
            searchInput.addEventListener('input', function() { filterChannels(this.value); });

            // ─── PROXY TOGGLE ───────────────────────────────────
            proxyToggle.addEventListener('click', function() {
                proxyEnabled = !proxyEnabled;
                this.classList.toggle('active', proxyEnabled);
                proxyStatus.textContent = proxyEnabled ? 'ON' : 'off';
                proxyStatus.style.color = proxyEnabled ? '#3b82f6' : '#8b95b5';
                setStatus(proxyEnabled ? 'Proxy ON' : 'Proxy OFF', 1500);
                // Reload playlist if already loaded
                if (allChannels.length > 0) {
                    loadPlaylist();
                }
            });

            // ─── ASPECT (not used, keep for UI) ────────────────
            aspectSelect.addEventListener('change', function() {});

            // ─── SIDEBAR TOGGLE ─────────────────────────────────
            channelToggle.addEventListener('click', () => rightSidebar.classList.toggle('open'));
            closeSidebar.addEventListener('click', () => rightSidebar.classList.remove('open'));
            document.addEventListener('click', (e) => {
                if (window.innerWidth < 700 && rightSidebar.classList.contains('open')) {
                    if (!rightSidebar.contains(e.target) && e.target !== channelToggle && !channelToggle.contains(e.target)) {
                        rightSidebar.classList.remove('open');
                    }
                }
            });

            // ─── INIT ────────────────────────────────────────────
            loadPlaylist();

        })();
    </script>
</body>
</html>
