<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ISEKAI · ULTRA</title>
    <!-- HLS & DASH libraries -->
    <script src="https://cdn.jsdelivr.net/npm/dashjs@4.5.0/dist/dash.all.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/hls-video-element/+esm"></script>
    <!-- YouTube-style UI -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/player.style/yt/+esm"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c14;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #e0e7ff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .top-bar {
            padding: 6px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px 10px;
            z-index: 10;
            min-height: 44px;
        }
        .top-bar .brand {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #e0e7ff;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.3px;
        }
        .brand i {
            font-style: normal;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #0a0c14;
        }
        .top-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .top-controls button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #c8d0e8;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            min-height: 28px;
            font-family: inherit;
            background: #1a1f2e;
            border-color: rgba(255,255,255,0.1);
        }
        .top-controls button:hover { background: #2a2f42; }
        .top-controls .proxy-btn.active {
            background: #2563eb;
            border-color: #3b82f6;
            color: #fff;
        }
        .top-controls .proxy-status {
            font-size: 10px;
            color: #8b95b5;
            min-width: 18px;
        }

        .main-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .player-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #07090e;
            position: relative;
            min-width: 0;
        }
        .video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0c14;
            overflow: hidden;
        }
        .video-container media-theme-yt {
            width: 100%;
            height: 100%;
            display: block;
            --media-primary-color: #FF5722;
            --media-text-color: #fff;
            --media-background-color: #000;
        }
        .video-container video,
        .video-container hls-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a0c14;
            display: block;
        }
        /* Hide default controls to let media-theme-yt handle them */
        video::-webkit-media-controls,
        hls-video::-webkit-media-controls {
            display: none !important;
        }
        .fit-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 6px 0;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.03);
            flex-shrink: 0;
        }
        .fit-controls button {
            background: #1a1f2e;
            border: 1px solid rgba(255,255,255,0.08);
            color: #c8d0e8;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }
        .fit-controls button:hover { background: #2a2f42; }
        .fit-controls button.active {
            background: #FF5722;
            border-color: #FF5722;
            color: #fff;
            box-shadow: 0 0 12px rgba(255,87,34,0.3);
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            z-index: 20;
            pointer-events: none;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-msg {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 4px 16px;
            border-radius: 30px;
            color: #c8d0e8;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            z-index: 30;
        }
        .status-msg.show { opacity: 1; }

        /* Right sidebar */
        .right-sidebar {
            width: 300px;
            max-width: 35vw;
            background: rgba(10,13,24,0.94);
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .sidebar-header span {
            color: #c8d0e8;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-header .badge {
            background: #6366f1;
            color: #fff;
            border-radius: 20px;
            padding: 0 8px;
            font-size: 11px;
        }
        .sidebar-header .close-btn {
            background: none;
            border: none;
            color: #8b95b5;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            display: none;
        }
        .search-box {
            padding: 4px 12px 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 6px 14px;
            color: #e0e7ff;
            font-size: 12px;
            outline: none;
            font-family: inherit;
        }
        .search-box input::placeholder { color: #6b7a9a; }
        .search-box input:focus { border-color: #6366f1; }

        .channel-list-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0 12px 0;
            -webkit-overflow-scrolling: touch;
        }
        .channel-list-wrap::-webkit-scrollbar { width: 3px; }
        .channel-list-wrap::-webkit-scrollbar-track { background: transparent; }
        .channel-list-wrap::-webkit-scrollbar-thumb { background: #3b4466; border-radius: 8px; }

        .category-group { margin-bottom: 4px; }
        .category-title {
            padding: 2px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #818cf8;
            font-weight: 600;
            background: rgba(99,102,241,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.02);
            padding-top: 8px;
            padding-bottom: 2px;
        }
        .channel-item {
            padding: 4px 12px;
            margin: 1px 6px;
            border-radius: 6px;
            color: #c8d0e8;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.1s;
            border-left: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
        }
        .channel-item:hover { background: rgba(255,255,255,0.06); color: #fff; border-left-color: #818cf8; }
        .channel-item.active { background: rgba(99,102,241,0.15); color: #fff; border-left-color: #818cf8; }
        .channel-item .ch-logo {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: #1a1f2e;
            object-fit: cover;
            flex-shrink: 0;
        }
        .channel-item .ch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }

        .toggle-channels {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 40;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e0e7ff;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-family: inherit;
        }
        .toggle-channels .badge { background: #6366f1; color: #fff; border-radius: 20px; padding: 0 8px; font-size: 11px; }

        .status-bar {
            padding: 4px 16px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.03);
            font-size: 11px;
            color: #8b95b5;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        @media (max-width: 700px) {
            .right-sidebar {
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                width: 280px;
                max-width: 75vw;
                transform: translateX(105%);
                transition: transform 0.25s ease;
                z-index: 50;
                border-left: 1px solid rgba(255,255,255,0.1);
                background: rgba(10,13,24,0.95);
                box-shadow: -8px 0 30px rgba(0,0,0,0.6);
            }
            .right-sidebar.open { transform: translateX(0); }
            .toggle-channels { display: flex; }
            .sidebar-header .close-btn { display: block; }
            .top-controls button { font-size: 10px; padding: 2px 10px; min-height: 24px; }
            .top-bar { padding: 4px 8px; }
            .brand i { font-size: 10px; }
            .status-msg { bottom: 70px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="brand"><span>⚡ISEKAI</span><i>v1.5</i></div>
        <div class="top-controls">
            <button class="proxy-btn" id="proxyToggle">🔀Proxy</button>
            <span class="proxy-status" id="proxyStatus">off</span>
            <select id="aspectSelect"><option value="default">Aspect</option><option value="16-9">16:9</option><option value="4-3">4:3</option><option value="21-9">21:9</option></select>
        </div>
    </div>

    <!-- Main Area -->
    <div class="main-area">
        <div class="player-wrapper">
            <div class="video-container" id="videoContainer">
                <!-- media-theme-yt provides full UI with settings (gear icon) -->
                <media-theme-yt>
                    <!-- hls-video for HLS and MP4, video for DASH (dash.js will attach) -->
                    <hls-video id="hlsPlayer" slot="media" class="media" playsinline crossorigin="anonymous" autoplay muted></hls-video>
                    <video id="dashPlayer" slot="media" class="media" playsinline crossorigin="anonymous" autoplay muted style="display: none;"></video>
                </media-theme-yt>
                <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
                <div class="status-msg" id="statusMsg">Ready</div>
                <button class="toggle-channels" id="channelToggle">📺 Channels <span class="badge" id="channelCountMobile">0</span></button>
            </div>
            <!-- Fit controls (outside media-theme-yt) -->
            <div class="fit-controls">
                <button class="fit-button active" data-fit="contain">Fit</button>
                <button class="fit-button" data-fit="cover">Fill</button>
                <button class="fit-button" data-fit="fill">Stretch</button>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar" id="rightSidebar">
            <div class="sidebar-header">
                <span>📺 Channels <span class="badge" id="channelCount">0</span></span>
                <button class="close-btn" id="closeSidebar">✕</button>
            </div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search…" autocomplete="off"></div>
            <div class="channel-list-wrap" id="channelListWrap"><div id="channelList"></div></div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span id="statusMsgBar">Ready</span>
        <span id="channelCountBar">0 channels</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── Config ───────────────────────────────────────────
            const PLAYLIST_URLS = [
                'https://servertvhub.site/zee5/playlist.php',
                 // Added new playlist
            ];
            const PROXY1 = 'https://demonji.onrender.com/cors-proxy.php?url=';
            const PROXY2 = 'https://demonji.onrender.com/cors-proxy.php/';

            let allChannels = [];
            let filteredChannels = [];
            let currentChannel = null;
            let proxyEnabled = false;
            let proxyFailover = false; // for automatic fallback
            let loading = false;
            let dashInstance = null; // dash.js instance
            let hlsPlayer = document.getElementById('hlsPlayer');
            let dashPlayer = document.getElementById('dashPlayer');

            // DOM refs
            const videoContainer = document.getElementById('videoContainer');
            const rightSidebar = document.getElementById('rightSidebar');
            const channelListEl = document.getElementById('channelList');
            const channelToggle = document.getElementById('channelToggle');
            const closeSidebar = document.getElementById('closeSidebar');
            const channelCount = document.getElementById('channelCount');
            const channelCountMobile = document.getElementById('channelCountMobile');
            const channelCountBar = document.getElementById('channelCountBar');
            const statusMsg = document.getElementById('statusMsg');
            const statusMsgBar = document.getElementById('statusMsgBar');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const proxyToggle = document.getElementById('proxyToggle');
            const proxyStatus = document.getElementById('proxyStatus');
            const aspectSelect = document.getElementById('aspectSelect');
            const searchInput = document.getElementById('searchInput');
            const fitButtons = document.querySelectorAll('.fit-button');

            let statusTimeout = null;

            function setStatus(text, duration = 3000) {
                statusMsg.textContent = text;
                statusMsg.classList.add('show');
                statusMsgBar.textContent = text;
                if (statusTimeout) clearTimeout(statusTimeout);
                if (duration > 0) statusTimeout = setTimeout(() => {
                    statusMsg.classList.remove('show');
                }, duration);
            }

            function setLoading(show) {
                loading = show;
                loadingOverlay.classList.toggle('show', show);
            }

            function getProxiedUrl(rawUrl) {
                if (!proxyEnabled) return rawUrl;
                const base = proxyFailover ? PROXY2 : PROXY1;
                if (rawUrl.startsWith('http')) return base + encodeURIComponent(rawUrl);
                return base + encodeURIComponent(rawUrl);
            }

            // ─── fetch playlist ──────────────────────────────────
            async function fetchWithProxyFallback(url) {
                try {
                    const p1 = PROXY1 + encodeURIComponent(url);
                    const r1 = await fetch(p1, { signal: AbortSignal.timeout(8000) });
                    if (!r1.ok) throw new Error('Proxy1 status ' + r1.status);
                    const text = await r1.text();
                    return { text, proxyUsed: 1 };
                } catch (e) {
                    try {
                        const p2 = PROXY2 + encodeURIComponent(url);
                        const r2 = await fetch(p2, { signal: AbortSignal.timeout(8000) });
                        if (!r2.ok) throw new Error('Proxy2 status ' + r2.status);
                        const text = await r2.text();
                        return { text, proxyUsed: 2 };
                    } catch (e2) {
                        throw new Error('Both proxies failed: ' + e2.message);
                    }
                }
            }

            function parseM3U(text) {
                const lines = text.split(/\r?\n/);
                const result = [];
                let current = null;
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    if (line.startsWith('#EXTINF:')) {
                        const info = line.slice(8);
                        const parts = info.split(',');
                        const attrs = parts[0] || '';
                        const name = parts.slice(1).join(',') || 'Unknown';
                        let category = 'Uncategorized';
                        let logo = '';
                        const matchGroup = attrs.match(/group-title="([^"]*)"/);
                        if (matchGroup) category = matchGroup[1] || 'Uncategorized';
                        const matchLogo = attrs.match(/tvg-logo="([^"]*)"/);
                        if (matchLogo) logo = matchLogo[1] || '';
                        current = { name: name.trim(), category: category.trim(), logo, url: '' };
                    } else if (line.startsWith('#') === false && line.includes('://')) {
                        if (current) { current.url = line; result.push(current); current = null; }
                    }
                }
                return result;
            }

            async function loadAllPlaylists() {
                try {
                    setStatus('Loading playlists…', 0);
                    let combined = [];
                    let proxyUsed = 0;
                    for (const url of PLAYLIST_URLS) {
                        try {
                            const { text, proxyUsed: p } = await fetchWithProxyFallback(url);
                            const parsed = parseM3U(text);
                            combined = combined.concat(parsed);
                            if (p > proxyUsed) proxyUsed = p;
                        } catch (e) {
                            console.warn('Failed to load playlist:', url, e);
                        }
                    }
                    if (combined.length === 0) {
                        setStatus('No channels found.', 5000);
                        return;
                    }
                    allChannels = combined;
                    filteredChannels = [...allChannels];
                    renderChannels(filteredChannels);
                    const count = allChannels.length;
                    channelCount.textContent = count;
                    channelCountMobile.textContent = count;
                    channelCountBar.textContent = count + ' channels';
                    setStatus(`Loaded ${count} channels (proxy ${proxyUsed})`, 3000);
                } catch (e) {
                    setStatus('Failed to load: ' + e.message, 6000);
                }
            }

            function renderChannels(channels) {
                const groups = {};
                for (const ch of channels) {
                    const cat = ch.category || 'Uncategorized';
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(ch);
                }
                let html = '';
                for (const [cat, items] of Object.entries(groups)) {
                    html += `<div class="category-group"><div class="category-title">${cat}</div>`;
                    for (const ch of items) {
                        const logoHtml = ch.logo ? `<img class="ch-logo" src="${ch.logo}" alt="" loading="lazy" onerror="this.style.display='none'">` : `<span class="ch-logo" style="background:#1f2740;display:inline-flex;align-items:center;justify-content:center;font-size:9px;">📡</span>`;
                        html += `<div class="channel-item" data-url="${ch.url}" data-name="${ch.name}">
                            ${logoHtml}
                            <span class="ch-name">${ch.name}</span>
                        </div>`;
                    }
                    html += '</div>';
                }
                channelListEl.innerHTML = html;

                document.querySelectorAll('.channel-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const url = this.dataset.url;
                        const name = this.dataset.name;
                        if (!url) return setStatus('No stream URL', 3000);
                        document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        playStream(url, name);
                        if (window.innerWidth < 700) rightSidebar.classList.remove('open');
                    });
                });
            }

            // ─── Playback engine (using hls-video and dash.js) ──
            function playStream(url, name) {
                // Clean up previous instances
                if (dashInstance) {
                    dashInstance.destroy();
                    dashInstance = null;
                }
                // Reset players
                hlsPlayer.removeAttribute('src');
                dashPlayer.removeAttribute('src');
                hlsPlayer.style.display = 'block';
                dashPlayer.style.display = 'none';
                hlsPlayer.muted = true; // mute to allow autoplay

                currentChannel = { url, name };
                setLoading(true);
                setStatus(`Loading ${name}…`, 0);

                const lower = url.toLowerCase();
                const isMpd = lower.includes('.mpd') || lower.includes('mpd');
                const isPhp = lower.includes('.php');
                // Support for .ts and .mp4 - they will be handled by hls-video-element
                const isTs = lower.includes('.ts');
                const isMp4 = lower.includes('.mp4');
                let streamUrl = proxyEnabled ? getProxiedUrl(url) : url;

                // Helper to attempt playback
                const playWithHls = () => {
                    hlsPlayer.style.display = 'block';
                    dashPlayer.style.display = 'none';
                    hlsPlayer.src = streamUrl;
                    hlsPlayer.load();
                    // Autoplay is handled by the media-theme-yt controls
                    setLoading(false);
                    setStatus(`Playing ${name} (HLS/MP4/TS)`, 2500);
                    // The media-theme-yt will show the controls and quality selector automatically
                };

                const playWithDash = () => {
                    hlsPlayer.style.display = 'none';
                    dashPlayer.style.display = 'block';
                    // Ensure dash.js is loaded
                    if (typeof dashjs === 'undefined' || typeof dashjs.MediaPlayer === 'undefined') {
                        setStatus('DASH.js not loaded.', 5000);
                        setLoading(false);
                        return;
                    }
                    dashInstance = dashjs.MediaPlayer().create();
                    dashInstance.initialize(dashPlayer, streamUrl, true);
                    dashInstance.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
                        setLoading(false);
                        setStatus(`Playing ${name} (DASH)`, 2500);
                    });
                    dashInstance.on(dashjs.MediaPlayer.events.ERROR, (e) => {
                        console.error('DASH error:', e);
                        setStatus('DASH error: ' + (e.error.message || 'unknown'), 5000);
                        setLoading(false);
                    });
                };

                // If .mpd or .php, try DASH first, fallback to HLS
                if (isMpd || isPhp) {
                    playWithDash();
                } else {
                    // For .ts, .mp4, .m3u8, etc. use HLS player
                    playWithHls();
                }
            }

            // ─── Fit buttons ────────────────────────────────────
            fitButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const fit = this.dataset.fit;
                    // Apply to both players
                    const players = [hlsPlayer, dashPlayer];
                    players.forEach(p => {
                        if (fit === 'contain') p.style.objectFit = 'contain';
                        else if (fit === 'cover') p.style.objectFit = 'cover';
                        else if (fit === 'fill') p.style.objectFit = 'fill';
                    });
                    fitButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // ─── Search ──────────────────────────────────────────
            function filterChannels(query) {
                const q = query.trim().toLowerCase();
                if (!q) filteredChannels = [...allChannels];
                else filteredChannels = allChannels.filter(ch => ch.name.toLowerCase().includes(q));
                renderChannels(filteredChannels);
            }
            searchInput.addEventListener('input', function() { filterChannels(this.value); });

            // ─── Proxy ──────────────────────────────────────────
            proxyToggle.addEventListener('click', function() {
                proxyEnabled = !proxyEnabled;
                proxyFailover = false;
                this.classList.toggle('active', proxyEnabled);
                proxyStatus.textContent = proxyEnabled ? 'ON' : 'off';
                proxyStatus.style.color = proxyEnabled ? '#3b82f6' : '#8b95b5';
                setStatus(proxyEnabled ? 'Proxy ON' : 'Proxy OFF', 1500);
                if (currentChannel) playStream(currentChannel.url, currentChannel.name);
            });

            // ─── Aspect (just for UI, not used) ────────────────
            aspectSelect.addEventListener('change', function() {
                // Not used with object-fit; we use fit buttons
            });

            // ─── Sidebar toggle ──────────────────────────────────
            channelToggle.addEventListener('click', () => rightSidebar.classList.toggle('open'));
            closeSidebar.addEventListener('click', () => rightSidebar.classList.remove('open'));
            document.addEventListener('click', (e) => {
                if (window.innerWidth < 700 && rightSidebar.classList.contains('open')) {
                    if (!rightSidebar.contains(e.target) && e.target !== channelToggle && !channelToggle.contains(e.target)) {
                        rightSidebar.classList.remove('open');
                    }
                }
            });

            // ─── Init ────────────────────────────────────────────
            loadAllPlaylists();

        })();
    </script>
</body>
</html>
