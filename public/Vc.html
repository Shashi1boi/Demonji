<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VOICY</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0b0e14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e4ec;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .app {
      max-width: 400px;
      width: 100%;
      background: #141c2b;
      border-radius: 32px;
      padding: 20px 16px 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 640px;
      max-height: 90vh;
      position: relative;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #5b8def, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .id-badge {
      background: #1f2a3e;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #9bb1d0;
    }
    .id-badge span { color: #fff; font-weight: 600; letter-spacing: 1px; }
    .id-badge .refresh-btn {
      background: none;
      border: none;
      color: #5b8def;
      cursor: pointer;
      font-size: 14px;
    }

    .mode-toggle {
      display: flex;
      gap: 4px;
      background: #1f2a3e;
      border-radius: 40px;
      padding: 3px;
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    .mode-toggle button {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 0;
      border-radius: 30px;
      font-weight: 500;
      color: #8599b9;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
    }
    .mode-toggle button.active {
      background: #2b7ae9;
      color: #fff;
      box-shadow: 0 2px 8px rgba(43,122,233,0.3);
    }

    .call-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1f2a3e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 500;
      color: #7f9bd0;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
      margin-bottom: 8px;
      transition: 0.3s;
    }
    .avatar.active { background: #2b7ae9; color: #fff; }
    .status-text {
      font-size: 18px;
      font-weight: 600;
      margin: 4px 0 2px;
    }
    .sub-status {
      font-size: 13px;
      color: #8599b9;
      margin-bottom: 12px;
    }
    .timer { font-size: 16px; color: #a78bfa; margin-bottom: 10px; }

    .input-row {
      display: flex;
      gap: 6px;
      width: 100%;
      background: #1f2a3e;
      border-radius: 40px;
      padding: 3px 3px 3px 14px;
      margin-bottom: 10px;
    }
    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 14px;
      outline: none;
      padding: 8px 0;
      min-width: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-row input::placeholder { text-transform: none; color: #5c6f8a; letter-spacing: 0; }
    .input-row button {
      background: #2b7ae9;
      border: none;
      border-radius: 30px;
      padding: 8px 16px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .input-row button:hover { background: #1e62c0; }

    .group-ui {
      display: none;
      width: 100%;
      flex-direction: column;
      gap: 6px;
    }
    .group-ui.show { display: flex; }
    .group-row {
      display: flex;
      gap: 6px;
      background: #1f2a3e;
      border-radius: 40px;
      padding: 3px 3px 3px 14px;
    }
    .group-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 14px;
      outline: none;
      padding: 8px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .group-row input::placeholder { text-transform: none; color: #5c6f8a; }
    .group-row button {
      background: #2b7ae9;
      border: none;
      border-radius: 30px;
      padding: 8px 16px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    .group-row .host-btn { background: #6c5ce7; }
    .group-row button:hover { filter: brightness(1.1); }

    .participants {
      background: #1f2a3e;
      border-radius: 20px;
      padding: 10px 12px;
      max-height: 80px;
      overflow-y: auto;
      font-size: 13px;
    }
    .participants .title { color: #6a7b96; font-size: 11px; letter-spacing: 0.5px; margin-bottom: 4px; }
    .participant {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }
    .participant .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }
    .participant .dot.muted { background: #f44336; }

    /* Chat area */
    .chat-area {
      display: none;
      flex-direction: column;
      background: #0e1625;
      border-radius: 20px;
      margin-top: 6px;
      max-height: 120px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .chat-area.show { display: flex; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 13px;
      max-height: 80px;
    }
    .chat-messages .msg {
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex;
      gap: 6px;
    }
    .chat-messages .msg .sender { font-weight: 600; color: #a78bfa; }
    .chat-messages .msg .text { color: #e0e4ec; word-break: break-word; }
    .chat-input {
      display: flex;
      gap: 6px;
      padding: 4px 8px 4px 12px;
      background: #1f2a3e;
      border-radius: 40px;
      margin: 4px;
    }
    .chat-input input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      outline: none;
      padding: 6px 0;
      font-size: 13px;
    }
    .chat-input button {
      background: #2b7ae9;
      border: none;
      border-radius: 30px;
      padding: 4px 14px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    .chat-input button:hover { background: #1e62c0; }

    .controls {
      display: none;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 8px 0 4px;
      width: 100%;
      flex-shrink: 0;
    }
    .controls.show { display: flex; }
    .ctrl-btn {
      background: #1f2a3e;
      border: none;
      border-radius: 40px;
      padding: 8px 14px;
      color: #e0e4ec;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .ctrl-btn:hover { background: #2b3547; }
    .ctrl-btn.danger { background: #d93f4c; }
    .ctrl-btn.danger:hover { background: #b32e3a; }
    .ctrl-btn.muted { background: #4a3a3a; color: #ff8a8a; }
    .ctrl-btn.active { background: #2b7ae9; }

    .volume-slider {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: #1f2a3e;
      border-radius: 40px;
      padding: 4px 12px;
      margin-top: 4px;
    }
    .volume-slider label { font-size: 12px; color: #8599b9; }
    .volume-slider input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 3px;
      background: #2b3547;
      outline: none;
    }
    .volume-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2b7ae9;
      cursor: pointer;
    }

    .footer { margin-top: 10px; font-size: 10px; color: #4a5a74; text-align: center; flex-shrink: 0; }

    /* Incoming overlay */
    .incoming-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(11,14,20,0.94);
      border-radius: 32px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 20px;
    }
    .incoming-overlay.show { display: flex; }
    .incoming-overlay .avatar { width: 80px; height: 80px; font-size: 34px; margin-bottom: 8px; }
    .incoming-overlay .name { font-size: 22px; font-weight: 600; }
    .incoming-overlay .sub { color: #8599b9; margin-bottom: 20px; }
    .incoming-overlay .actions {
      display: flex;
      gap: 30px;
    }
    .incoming-overlay .actions button {
      background: #1f2a3e;
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .incoming-overlay .actions .accept { background: #2b7ae9; }
    .incoming-overlay .actions .accept:hover { background: #1e62c0; }
    .incoming-overlay .actions .reject { background: #d93f4c; }
    .incoming-overlay .actions .reject:hover { background: #b32e3a; }

    /* scrollbar */
    .participants::-webkit-scrollbar, .chat-messages::-webkit-scrollbar { width: 3px; }
    .participants::-webkit-scrollbar-track, .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .participants::-webkit-scrollbar-thumb, .chat-messages::-webkit-scrollbar-thumb { background: #2b3547; border-radius: 10px; }
  </style>
</head>
<body>

<div class="app" id="app">

  <div class="incoming-overlay" id="incomingOverlay">
    <div class="avatar" id="incomingAvatar">📞</div>
    <div class="name" id="incomingName">Unknown</div>
    <div class="sub" id="incomingSub">is calling</div>
    <div class="actions">
      <button class="accept" id="acceptCall">Accept</button>
      <button class="reject" id="rejectCall">Reject</button>
    </div>
  </div>

  <div class="header">
    <h1>📞 VOICY</h1>
    <div class="id-badge">
      ID <span id="myIdDisplay">----</span>
      <button class="refresh-btn" id="refreshIdBtn">⟳</button>
    </div>
  </div>

  <div class="mode-toggle" id="modeToggle">
    <button class="active" data-mode="single">Single</button>
    <button data-mode="group">Group</button>
  </div>

  <div class="call-area" id="callArea">
    <div class="avatar" id="avatarIcon">🎙️</div>
    <div class="status-text" id="statusText">Ready</div>
    <div class="sub-status" id="subStatus">Enter a 4‑letter ID</div>
    <div class="timer" id="timerDisplay" style="display:none;">00:00</div>

    <!-- Single UI -->
    <div id="singleUI" class="input-row">
      <input type="text" id="peerInput" placeholder="Peer ID" maxlength="4" autocomplete="off">
      <button id="callBtn">Call</button>
    </div>

    <!-- Group UI -->
    <div id="groupUI" class="group-ui">
      <div class="group-row">
        <input type="text" id="groupCodeInput" placeholder="Group code (host ID)" maxlength="4">
        <button id="joinGroupBtn">Join</button>
      </div>
      <div class="group-row">
        <button id="createGroupBtn" class="host-btn">✨ Create Group</button>
        <span style="font-size:11px; color:#6a7b96; margin-left:4px;">(you host)</span>
      </div>
      <div class="participants" id="participantsList">
        <div class="title">Participants</div>
        <div id="participantsContainer"><span style="color:#6a7b96; font-size:12px;">None</span></div>
      </div>
      <!-- Chat (group only) -->
      <div class="chat-area" id="chatArea">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Type a message..." maxlength="200">
          <button id="sendChatBtn">Send</button>
        </div>
      </div>
    </div>

    <!-- Controls (mute, speaker, end) -->
    <div class="controls" id="callControls">
      <button class="ctrl-btn" id="muteBtn"><span>🎤</span> Mute</button>
      <button class="ctrl-btn" id="speakerBtn"><span>🔊</span> Speaker</button>
      <button class="ctrl-btn danger" id="endCallBtn"><span>📵</span> End</button>
      <div class="volume-slider">
        <label>🔊</label>
        <input type="range" id="callVolume" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <div class="footer">By DEMONJI · ultra‑low latency</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<script>
  (function(){
    // ---- UTILITIES ----
    function genId() {
      let id = '';
      for (let i=0; i<4; i++) id += String.fromCharCode(97 + Math.floor(Math.random()*26));
      return id;
    }

    // ---- DOM refs ----
    const $ = id => document.getElementById(id);
    const myIdSpan = $('myIdDisplay');
    const refreshIdBtn = $('refreshIdBtn');
    const avatarIcon = $('avatarIcon');
    const statusText = $('statusText');
    const subStatus = $('subStatus');
    const timerDisplay = $('timerDisplay');
    const singleUI = $('singleUI');
    const groupUI = $('groupUI');
    const peerInput = $('peerInput');
    const callBtn = $('callBtn');
    const groupCodeInput = $('groupCodeInput');
    const joinGroupBtn = $('joinGroupBtn');
    const createGroupBtn = $('createGroupBtn');
    const participantsContainer = $('participantsContainer');
    const chatArea = $('chatArea');
    const chatMessages = $('chatMessages');
    const chatInput = $('chatInput');
    const sendChatBtn = $('sendChatBtn');
    const callControls = $('callControls');
    const muteBtn = $('muteBtn');
    const speakerBtn = $('speakerBtn');
    const endCallBtn = $('endCallBtn');
    const callVolumeSlider = $('callVolume');
    const incomingOverlay = $('incomingOverlay');
    const incomingAvatar = $('incomingAvatar');
    const incomingName = $('incomingName');
    const incomingSub = $('incomingSub');
    const acceptCall = $('acceptCall');
    const rejectCall = $('rejectCall');
    const modeToggle = $('modeToggle');

    // ---- STATE ----
    let peer = null;
    let myId = '';
    let myName = 'User';
    let mode = 'single';
    let isInCall = false;
    let isMuted = false;
    let isSpeakerOn = false;
    let localStream = null;
    let remoteAudioElements = [];
    let audioContext = null;

    // Timer
    let callStartTime = null, timerInterval = null, timerRunning = false;

    // Single call
    let singleCall = null, singleCallAnswered = false, calleeRejected = false, waitingTimeout = null;

    // Group call
    let isGroupHost = false;
    let groupMembers = [];
    let groupCalls = {};          // peerId -> MediaConnection
    let groupDataConns = {};      // peerId -> DataConnection (only host keeps)
    let groupHostId = null;
    let participantNames = {};

    // Chat
    let chatMessagesList = [];

    // ---- Helper: update ID display ----
    function updateIdDisplay(id) {
      myIdSpan.textContent = id.toUpperCase();
    }

    // ---- Timer ----
    function startTimer() {
      if (timerRunning) return;
      callStartTime = Date.now();
      timerRunning = true;
      timerDisplay.style.display = 'inline-block';
      updateTimerDisplay();
      timerInterval = setInterval(updateTimerDisplay, 1000);
    }
    function stopTimer() {
      timerRunning = false;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      timerDisplay.style.display = 'none';
      timerDisplay.textContent = '00:00';
      callStartTime = null;
    }
    function updateTimerDisplay() {
      if (!callStartTime) return;
      const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
      const mins = String(Math.floor(elapsed / 60)).padStart(2,'0');
      const secs = String(elapsed % 60).padStart(2,'0');
      timerDisplay.textContent = `${mins}:${secs}`;
    }

    // ---- Volume ----
    function updateCallVolume(val) {
      const v = parseFloat(val) / 100;
      remoteAudioElements.forEach(el => { if (el) el.volume = v; });
    }
    callVolumeSlider.addEventListener('input', function() { updateCallVolume(this.value); });

    // ---- Remote audio ----
    function playRemoteStream(stream) {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const audioEl = new Audio();
      audioEl.srcObject = stream;
      audioEl.volume = parseFloat(callVolumeSlider.value) / 100;
      audioEl.autoplay = true;
      audioEl.play().catch(() => {});
      if (isSpeakerOn) setSpeaker(audioEl, true);
      remoteAudioElements.push(audioEl);
      return audioEl;
    }

    // ---- Monitor connection ----
    function monitorCallConnection(callObj, onEnd) {
      if (!callObj || !callObj.peerConnection) return;
      const pc = callObj.peerConnection;
      const handler = () => {
        const state = pc.connectionState;
        if (state === 'disconnected' || state === 'failed' || state === 'closed') {
          if (onEnd) onEnd();
        }
      };
      pc.addEventListener('connectionstatechange', handler);
      return () => pc.removeEventListener('connectionstatechange', handler);
    }

    // ---- PEER INIT ----
    function initPeer(retryCount = 0) {
      myId = genId();
      updateIdDisplay(myId);
      statusText.textContent = 'Connecting...';
      subStatus.textContent = 'Registering...';

      if (peer) { peer.destroy(); peer = null; }

      peer = new Peer(myId, {
        debug: 0,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
      });

      peer.on('open', (id) => {
        if (id !== myId) { myId = id; updateIdDisplay(myId); }
        statusText.textContent = 'Ready';
        subStatus.textContent = mode === 'single' ? 'Enter a 4‑letter ID to call' : 'Create or join a group';
        avatarIcon.textContent = '🎙️';
        avatarIcon.classList.remove('active');
        console.log('Peer open:', id);
        document.addEventListener('click', function resumeAudio() {
          if (audioContext && audioContext.state === 'suspended') audioContext.resume();
          document.removeEventListener('click', resumeAudio);
        }, { once: true });
      });

      peer.on('error', (err) => {
        console.warn('Peer error:', err);
        if (err.type === 'unavailable-id') {
          peer.destroy();
          initPeer(retryCount + 1);
        } else {
          statusText.textContent = '⚠️ Error';
          subStatus.textContent = err.message || 'Check internet or refresh';
          avatarIcon.textContent = '⚠️';
        }
      });

      peer.on('call', (incoming) => {
        if (mode === 'single') {
          if (singleCall) { incoming.close(); return; }
          const callerName = incoming.metadata?.name || incoming.peer;
          incomingName.textContent = callerName;
          incomingAvatar.textContent = callerName.charAt(0).toUpperCase();
          incomingSub.textContent = 'is calling you';
          incomingOverlay.classList.add('show');
          incoming._callerName = callerName;
          window._incomingSingle = incoming;
        } else {
          // group mode: auto‑accept if we are in a group and caller is known
          if (isInCall && mode === 'group') {
            const caller = incoming.peer;
            const isKnown = groupMembers.includes(caller) || (groupHostId && caller === groupHostId);
            if (isKnown) {
              acceptIncomingGroupCall(incoming);
            } else {
              incoming.close();
            }
          } else {
            incoming.close();
          }
        }
      });

      peer.on('connection', (conn) => {
        if (mode === 'group' && isGroupHost && isInCall) {
          handleDataConnection(conn);
        } else {
          conn.close();
        }
      });
    }

    // ---- Refresh ID ----
    function refreshId() {
      if (isInCall) {
        if (!confirm('This will end your current call. Continue?')) return;
        if (mode === 'single') cleanupSingle(); else leaveGroup();
      }
      if (peer) peer.destroy();
      initPeer();
    }
    refreshIdBtn.addEventListener('click', refreshId);

    // ---- SINGLE CALL ----
    async function acceptSingleCall() {
      const incoming = window._incomingSingle;
      if (!incoming) return;
      try {
        if (!localStream) localStream = await getAudioStream();
        incoming.answer(localStream);
        singleCall = incoming;
        singleCallAnswered = false;
        calleeRejected = false;
        setupSingleCallEvents(singleCall);
        incomingOverlay.classList.remove('show');
        window._incomingSingle = null;
        isInCall = true;
        callControls.classList.add('show');
        singleUI.style.display = 'none';
        groupUI.classList.remove('show');
        chatArea.classList.remove('show');
        const name = incoming._callerName || incoming.peer;
        statusText.textContent = `Call with ${name}`;
        subStatus.textContent = `ID: ${incoming.peer}`;
        avatarIcon.textContent = name.charAt(0).toUpperCase();
        avatarIcon.classList.add('active');
        updateCallVolume(callVolumeSlider.value);
        if (waitingTimeout) { clearTimeout(waitingTimeout); waitingTimeout = null; }
      } catch (e) {
        alert('Could not accept call: ' + e.message);
        incomingOverlay.classList.remove('show');
        window._incomingSingle = null;
      }
    }

    function rejectSingleCall() {
      const incoming = window._incomingSingle;
      if (incoming) {
        calleeRejected = true;
        incoming.close();
        window._incomingSingle = null;
        statusText.textContent = 'Call rejected';
        subStatus.textContent = 'You declined the call';
        avatarIcon.textContent = '❌';
        avatarIcon.classList.remove('active');
      }
      incomingOverlay.classList.remove('show');
      callControls.classList.remove('show');
      singleUI.style.display = 'flex';
    }

    async function startSingleCall(targetId) {
      try {
        if (!localStream) localStream = await getAudioStream();
        const callOptions = { metadata: { name: myName } };
        const out = peer.call(targetId, localStream, callOptions);
        singleCall = out;
        singleCallAnswered = false;
        calleeRejected = false;
        setupSingleCallEvents(singleCall);
        isInCall = true;
        callControls.classList.add('show');
        singleUI.style.display = 'none';
        groupUI.classList.remove('show');
        chatArea.classList.remove('show');
        statusText.textContent = `Calling ${targetId.toUpperCase()}...`;
        subStatus.textContent = `ID: ${targetId.toUpperCase()}`;
        avatarIcon.textContent = '📞';
        avatarIcon.classList.add('active');
        updateCallVolume(callVolumeSlider.value);

        if (waitingTimeout) clearTimeout(waitingTimeout);
        waitingTimeout = setTimeout(() => {
          if (singleCall && !singleCallAnswered && isInCall) {
            stopTimer();
            cleanupSingle();
            statusText.textContent = 'Call rejected';
            subStatus.textContent = 'No answer';
            avatarIcon.textContent = '❌';
            avatarIcon.classList.remove('active');
            callControls.classList.remove('show');
            singleUI.style.display = 'flex';
            waitingTimeout = null;
          }
        }, 10000);
      } catch (e) {
        alert('Could not start call: ' + e.message);
      }
    }

    function setupSingleCallEvents(c) {
      const stateMonitor = monitorCallConnection(c, () => {
        if (isInCall && singleCall === c) {
          stopTimer(); cleanupSingle();
          statusText.textContent = 'Call ended';
          subStatus.textContent = 'Connection lost';
          avatarIcon.textContent = '📵';
          avatarIcon.classList.remove('active');
          callControls.classList.remove('show');
          singleUI.style.display = 'flex';
          if (waitingTimeout) { clearTimeout(waitingTimeout); waitingTimeout = null; }
        }
      });

      c.on('stream', (remote) => {
        singleCallAnswered = true;
        calleeRejected = false;
        if (waitingTimeout) { clearTimeout(waitingTimeout); waitingTimeout = null; }
        playRemoteStream(remote);
        const name = c.metadata?.name || c.peer;
        statusText.textContent = `Call with ${name}`;
        subStatus.textContent = `ID: ${c.peer}`;
        avatarIcon.textContent = name.charAt(0).toUpperCase();
        avatarIcon.classList.add('active');
        startTimer();
      });
      c.on('close', () => {
        stopTimer();
        const wasAnswered = singleCallAnswered;
        const wasRejectedByUs = calleeRejected;
        cleanupSingle();
        if (waitingTimeout) { clearTimeout(waitingTimeout); waitingTimeout = null; }
        if (wasAnswered) {
          statusText.textContent = 'Call ended';
          subStatus.textContent = 'The call has ended';
          avatarIcon.textContent = '📵';
        } else if (wasRejectedByUs) {
          statusText.textContent = 'Call rejected';
          subStatus.textContent = 'You declined';
          avatarIcon.textContent = '❌';
        } else {
          if (window._isCaller) {
            statusText.textContent = 'Call rejected';
            subStatus.textContent = 'Other side declined';
            avatarIcon.textContent = '❌';
          } else {
            statusText.textContent = 'Call ended';
            subStatus.textContent = 'Caller ended';
            avatarIcon.textContent = '📵';
          }
        }
        avatarIcon.classList.remove('active');
        callControls.classList.remove('show');
        singleUI.style.display = 'flex';
        if (stateMonitor) stateMonitor();
        calleeRejected = false;
        window._isCaller = false;
      });
      c.on('error', (err) => {
        console.warn('Single call error:', err);
        stopTimer();
        const wasAnswered = singleCallAnswered;
        const wasRejectedByUs = calleeRejected;
        cleanupSingle();
        if (waitingTimeout) { clearTimeout(waitingTimeout); waitingTimeout = null; }
        if (wasAnswered) {
          statusText.textContent = 'Call ended';
          subStatus.textContent = 'The call has ended';
          avatarIcon.textContent = '📵';
        } else if (wasRejectedByUs) {
          statusText.textContent = 'Call rejected';
          subStatus.textContent = 'You declined';
          avatarIcon.textContent = '❌';
        } else {
          if (err.type === 'peerClosed' || err.message?.includes('closed')) {
            if (window._isCaller) {
              statusText.textContent = 'Call rejected';
              subStatus.textContent = 'Other side declined';
              avatarIcon.textContent = '❌';
            } else {
              statusText.textContent = 'Call ended';
              subStatus.textContent = 'Caller ended';
              avatarIcon.textContent = '📵';
            }
          } else {
            statusText.textContent = 'Call error';
            subStatus.textContent = err.message || 'Try again';
            avatarIcon.textContent = '⚠️';
          }
        }
        avatarIcon.classList.remove('active');
        callControls.classList.remove('show');
        singleUI.style.display = 'flex';
        if (stateMonitor) stateMonitor();
        calleeRejected = false;
        window._isCaller = false;
      });
    }

    function cleanupSingle() {
      if (singleCall) { singleCall.close(); singleCall = null; }
      singleCallAnswered = false; calleeRejected = false;
      isInCall = false;
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      isMuted = false; isSpeakerOn = false;
      muteBtn.innerHTML = '<span>🎤</span> Mute';
      speakerBtn.innerHTML = '<span>🔊</span> Speaker';
      speakerBtn.classList.remove('active');
      callControls.classList.remove('show');
      singleUI.style.display = 'flex';
      groupUI.classList.remove('show');
      chatArea.classList.remove('show');
      remoteAudioElements.forEach(el => { el.srcObject = null; el.remove(); });
      remoteAudioElements = [];
      stopTimer();
      if (waitingTimeout) { clearTimeout(waitingTimeout); waitingTimeout = null; }
    }

    // ---- GROUP CALL ----
    function createGroup() {
      if (isInCall) {
        if (!confirm('You are already in a call. End it and create a group?')) return;
        leaveGroup();
      }
      isGroupHost = true;
      groupHostId = myId;
      groupMembers = [];
      participantNames = {};
      participantNames[myId] = myName;
      isInCall = true;
      singleUI.style.display = 'none';
      groupUI.classList.add('show');
      chatArea.classList.add('show');
      callControls.classList.add('show');
      statusText.textContent = 'Group Host';
      subStatus.textContent = `Code: ${myId.toUpperCase()}`;
      avatarIcon.textContent = '👑';
      avatarIcon.classList.add('active');
      updateParticipantsList();
      clearChat();
      if (!localStream) {
        getAudioStream().then(s => { localStream = s; }).catch(console.warn);
      }
      updateCallVolume(callVolumeSlider.value);
    }

    async function joinGroup(hostId) {
      if (isInCall) {
        if (!confirm('You are already in a call. End it and join group?')) return;
        leaveGroup();
      }
      if (hostId === myId) { alert('You cannot join your own group. Create one instead.'); return; }
      try {
        const dataConn = peer.connect(hostId, { reliable: true });
        dataConn.on('open', () => {
          dataConn.send({ type: 'join', name: myName });
        });
        dataConn.on('data', (data) => {
          handleGroupData(data, dataConn);
        });
        dataConn.on('close', () => {
          console.log('Data connection to host closed');
          leaveGroup();
        });
        dataConn.on('error', (err) => {
          console.warn('Data connection error:', err);
          alert('Could not connect to host. Make sure the host is online.');
          leaveGroup();
        });
        groupDataConns[hostId] = dataConn;
        groupHostId = hostId;
        isInCall = true;
        singleUI.style.display = 'none';
        groupUI.classList.add('show');
        chatArea.classList.add('show');
        callControls.classList.add('show');
        statusText.textContent = 'Joining group...';
        subStatus.textContent = `Connecting to ${hostId.toUpperCase()}`;
        avatarIcon.textContent = '📞';
        avatarIcon.classList.add('active');
        if (!localStream) {
          localStream = await getAudioStream();
        }
        updateCallVolume(callVolumeSlider.value);
        clearChat();
      } catch (e) {
        alert('Could not join group: ' + e.message);
        leaveGroup();
      }
    }

    function handleGroupData(data, conn) {
      if (data.type === 'members') {
        const members = data.list || [];
        members.forEach(m => { participantNames[m.id] = m.name; });
        groupMembers = members.map(m => m.id).filter(id => id !== myId);
        members.forEach(m => {
          if (m.id !== myId && !groupCalls[m.id]) {
            initiateGroupCall(m.id);
          }
        });
        updateParticipantsList();
        statusText.textContent = 'In Group';
        subStatus.textContent = `${members.length} participant(s)`;
        avatarIcon.textContent = '🎤';
        avatarIcon.classList.add('active');
        // show chat messages if any
      } else if (data.type === 'new-member') {
        const newMember = data.id;
        const newName = data.name || newMember;
        participantNames[newMember] = newName;
        if (!groupMembers.includes(newMember)) {
          groupMembers.push(newMember);
          if (!groupCalls[newMember]) {
            initiateGroupCall(newMember);
          }
          updateParticipantsList();
        }
      } else if (data.type === 'member-left') {
        const leftId = data.id;
        if (groupMembers.includes(leftId)) {
          groupMembers = groupMembers.filter(id => id !== leftId);
          delete participantNames[leftId];
          if (groupCalls[leftId]) {
            groupCalls[leftId].close();
            delete groupCalls[leftId];
          }
          updateParticipantsList();
          subStatus.textContent = `${participantNames[leftId] || leftId} left`;
        }
      } else if (data.type === 'chat') {
        // relay chat message to UI
        const senderName = data.senderName || data.senderId;
        const text = data.text;
        addChatMessage(senderName, text);
      }
    }

    function initiateGroupCall(targetId) {
      if (targetId === myId) return;
      if (groupCalls[targetId]) return;
      try {
        if (!localStream) {
          getAudioStream().then(s => {
            localStream = s;
            doCall();
          }).catch(console.warn);
          return;
        }
        doCall();
      } catch (e) {
        console.warn('Failed to call', targetId, e);
      }
      function doCall() {
        const callOptions = { metadata: { name: myName } };
        const call = peer.call(targetId, localStream, callOptions);
        groupCalls[targetId] = call;
        setupGroupCallEvents(call, targetId);
      }
    }

    function acceptIncomingGroupCall(incoming) {
      const caller = incoming.peer;
      if (!isInCall || mode !== 'group') { incoming.close(); return; }
      const isKnown = groupMembers.includes(caller) || (groupHostId && caller === groupHostId);
      if (isKnown) {
        if (groupCalls[caller]) { incoming.close(); return; }
        if (!localStream) {
          getAudioStream().then(s => {
            localStream = s;
            incoming.answer(localStream);
          }).catch(()=>{incoming.close();});
        } else {
          incoming.answer(localStream);
        }
        groupCalls[caller] = incoming;
        setupGroupCallEvents(incoming, caller);
        if (!participantNames[caller]) {
          participantNames[caller] = incoming.metadata?.name || caller;
        }
        if (!groupMembers.includes(caller)) {
          groupMembers.push(caller);
          updateParticipantsList();
        }
        console.log('Accepted group call from', caller);
      } else {
        incoming.close();
      }
    }

    function setupGroupCallEvents(call, peerId) {
      const stateMonitor = monitorCallConnection(call, () => {
        if (groupCalls[peerId]) {
          delete groupCalls[peerId];
          groupMembers = groupMembers.filter(id => id !== peerId);
          delete participantNames[peerId];
          updateParticipantsList();
          if (isGroupHost) {
            broadcastToMembers({ type: 'member-left', id: peerId });
          }
          if (Object.keys(groupCalls).length === 0) {
            stopTimer();
            if (!isGroupHost) leaveGroup();
            else {
              statusText.textContent = 'Group Host (no members)';
              subStatus.textContent = 'Waiting for participants';
              avatarIcon.textContent = '👑';
            }
          }
        }
        if (stateMonitor) stateMonitor();
      });

      call.on('stream', (remote) => {
        playRemoteStream(remote);
        if (!groupMembers.includes(peerId)) {
          groupMembers.push(peerId);
          updateParticipantsList();
        }
        if (!participantNames[peerId]) {
          participantNames[peerId] = call.metadata?.name || peerId;
        }
        updateParticipantsList();
        if (isGroupHost) {
          broadcastToMembers({ type: 'new-member', id: peerId, name: participantNames[peerId] });
        }
        if (!timerRunning) startTimer();
      });
      call.on('close', () => {
        delete groupCalls[peerId];
        groupMembers = groupMembers.filter(id => id !== peerId);
        delete participantNames[peerId];
        updateParticipantsList();
        if (isGroupHost) {
          broadcastToMembers({ type: 'member-left', id: peerId });
        }
        if (Object.keys(groupCalls).length === 0) {
          stopTimer();
          if (!isGroupHost) leaveGroup();
          else {
            statusText.textContent = 'Group Host (no members)';
            subStatus.textContent = 'Waiting for participants';
            avatarIcon.textContent = '👑';
          }
        }
        if (stateMonitor) stateMonitor();
      });
      call.on('error', (err) => {
        console.warn('Group call error with', peerId, err);
        delete groupCalls[peerId];
        groupMembers = groupMembers.filter(id => id !== peerId);
        delete participantNames[peerId];
        updateParticipantsList();
        if (Object.keys(groupCalls).length === 0) {
          stopTimer();
          if (!isGroupHost) leaveGroup();
        }
        if (stateMonitor) stateMonitor();
      });
    }

    function handleDataConnection(conn) {
      if (!isGroupHost || !isInCall) { conn.close(); return; }
      const peerId = conn.peer;
      groupDataConns[peerId] = conn;
      conn.on('data', (data) => {
        if (data.type === 'join') {
          const newMember = peerId;
          const newName = data.name || peerId;
          participantNames[newMember] = newName;
          if (!groupMembers.includes(newMember)) {
            groupMembers.push(newMember);
            const memberList = groupMembers.map(id => ({ id, name: participantNames[id] }));
            memberList.push({ id: myId, name: myName });
            conn.send({ type: 'members', list: memberList });
            broadcastToMembers({ type: 'new-member', id: newMember, name: newName }, [newMember]);
            updateParticipantsList();
            initiateGroupCall(newMember);
          }
        } else if (data.type === 'chat') {
          // relay chat message to all members except sender
          const msg = {
            type: 'chat',
            senderId: peerId,
            senderName: participantNames[peerId] || peerId,
            text: data.text
          };
          // add to own chat
          addChatMessage(msg.senderName, msg.text);
          // broadcast to all others
          broadcastToMembers(msg, [peerId]);
        }
      });
      conn.on('close', () => {
        delete groupDataConns[peerId];
        if (groupMembers.includes(peerId)) {
          groupMembers = groupMembers.filter(id => id !== peerId);
          delete participantNames[peerId];
          broadcastToMembers({ type: 'member-left', id: peerId });
          updateParticipantsList();
        }
      });
      conn.on('error', (err) => {
        console.warn('Data connection error', err);
        delete groupDataConns[peerId];
      });
    }

    function broadcastToMembers(message, exclude = []) {
      Object.keys(groupDataConns).forEach(pid => {
        if (!exclude.includes(pid)) {
          try { groupDataConns[pid].send(message); } catch(e) {}
        }
      });
    }

    function updateParticipantsList() {
      const container = participantsContainer;
      if (groupMembers.length === 0 && !isGroupHost) {
        container.innerHTML = '<span style="color:#6a7b96; font-size:12px;">None</span>';
        return;
      }
      let html = '';
      const allIds = isGroupHost ? [myId, ...groupMembers] : [...groupMembers];
      allIds.forEach(id => {
        const isMe = (id === myId);
        const displayName = participantNames[id] || id;
        const label = isMe ? `${displayName} (host)` : displayName;
        const dotClass = 'dot' + (isMuted ? ' muted' : '');
        html += `<div class="participant"><span class="${dotClass}"></span>${label}</div>`;
      });
      container.innerHTML = html;
    }

    function leaveGroup() {
      Object.keys(groupCalls).forEach(id => { try { groupCalls[id].close(); } catch(e) {} });
      groupCalls = {};
      Object.keys(groupDataConns).forEach(id => { try { groupDataConns[id].close(); } catch(e) {} });
      groupDataConns = {};
      groupMembers = [];
      participantNames = {};
      isGroupHost = false;
      groupHostId = null;
      isInCall = false;
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      isMuted = false; isSpeakerOn = false;
      muteBtn.innerHTML = '<span>🎤</span> Mute';
      speakerBtn.innerHTML = '<span>🔊</span> Speaker';
      speakerBtn.classList.remove('active');
      callControls.classList.remove('show');
      groupUI.classList.remove('show');
      chatArea.classList.remove('show');
      singleUI.style.display = 'flex';
      avatarIcon.classList.remove('active');
      avatarIcon.textContent = '🎙️';
      statusText.textContent = 'Ready';
      subStatus.textContent = mode === 'single' ? 'Enter a 4‑letter ID to call' : 'Create or join a group';
      updateParticipantsList();
      remoteAudioElements.forEach(el => { el.srcObject = null; el.remove(); });
      remoteAudioElements = [];
      stopTimer();
      clearChat();
    }

    // ---- CHAT ----
    function addChatMessage(sender, text) {
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'msg';
      const senderSpan = document.createElement('span');
      senderSpan.className = 'sender';
      senderSpan.textContent = sender + ':';
      const textSpan = document.createElement('span');
      textSpan.className = 'text';
      textSpan.textContent = text;
      div.appendChild(senderSpan);
      div.appendChild(textSpan);
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function clearChat() {
      chatMessages.innerHTML = '';
    }

    function sendChatMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      const senderName = myName;
      // add to own UI
      addChatMessage(senderName, text);
      // If host, broadcast to all members via data connections
      if (isGroupHost) {
        const msg = { type: 'chat', senderId: myId, senderName: senderName, text: text };
        broadcastToMembers(msg);
      } else {
        // send to host (who will relay)
        const hostId = groupHostId;
        if (groupDataConns[hostId]) {
          try {
            groupDataConns[hostId].send({ type: 'chat', text: text });
          } catch(e) {}
        }
      }
    }

    // ---- SPEAKER ----
    function setSpeaker(audioEl, on) {
      if (typeof audioEl.setSinkId === 'function') {
        const sinkId = on ? 'speaker' : 'default';
        audioEl.setSinkId(sinkId).catch(() => {});
      }
    }

    function toggleSpeaker() {
      isSpeakerOn = !isSpeakerOn;
      speakerBtn.innerHTML = isSpeakerOn ? '<span>🔈</span> Earpiece' : '<span>🔊</span> Speaker';
      speakerBtn.classList.toggle('active', isSpeakerOn);
      remoteAudioElements.forEach(el => setSpeaker(el, isSpeakerOn));
    }

    // ---- AUDIO ----
    async function getAudioStream() {
      try {
        return await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
            latencyHint: 'interactive'
          }
        });
      } catch (e) {
        alert('Could not access microphone. Please allow permissions.');
        throw e;
      }
    }

    // ---- UI BINDINGS ----
    modeToggle.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const newMode = btn.dataset.mode;
      if (newMode === mode) return;
      if (isInCall) {
        if (!confirm('Switch mode? This will end your current call.')) return;
        if (mode === 'single') cleanupSingle(); else leaveGroup();
      }
      mode = newMode;
      document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (mode === 'single') {
        singleUI.style.display = 'flex';
        groupUI.classList.remove('show');
        chatArea.classList.remove('show');
        subStatus.textContent = 'Enter a 4‑letter ID to call';
      } else {
        singleUI.style.display = 'none';
        groupUI.classList.add('show');
        // chat area will be shown when in group call
        subStatus.textContent = 'Create or join a group';
      }
      statusText.textContent = 'Ready';
      avatarIcon.textContent = '🎙️';
      avatarIcon.classList.remove('active');
    });

    callBtn.addEventListener('click', async () => {
      const target = peerInput.value.trim().toLowerCase();
      if (!target || target.length !== 4) { alert('Enter exactly 4 letters.'); return; }
      if (target === myId) { alert('You cannot call yourself.'); return; }
      if (singleCall) { singleCall.close(); cleanupSingle(); }
      window._isCaller = true;
      await startSingleCall(target);
    });
    peerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') callBtn.click(); });
    peerInput.addEventListener('input', function() { this.value = this.value.toUpperCase().slice(0,4); });

    createGroupBtn.addEventListener('click', createGroup);
    joinGroupBtn.addEventListener('click', () => {
      const code = groupCodeInput.value.trim().toLowerCase();
      if (!code || code.length !== 4) { alert('Enter a 4‑letter group code.'); return; }
      if (code === myId) { alert('That\'s your own ID. Create a group instead.'); return; }
      joinGroup(code);
    });
    groupCodeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinGroupBtn.click(); });
    groupCodeInput.addEventListener('input', function() { this.value = this.value.toUpperCase().slice(0,4); });

    endCallBtn.addEventListener('click', () => {
      if (mode === 'single') {
        if (singleCall) { singleCall.close(); cleanupSingle(); }
      } else {
        leaveGroup();
      }
    });

    muteBtn.addEventListener('click', () => {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      muteBtn.innerHTML = isMuted ? '<span>🔇</span> Unmute' : '<span>🎤</span> Mute';
      muteBtn.classList.toggle('muted', isMuted);
      updateParticipantsList();
    });

    speakerBtn.addEventListener('click', toggleSpeaker);

    acceptCall.addEventListener('click', () => {
      if (mode === 'single') {
        window._isCaller = false;
        acceptSingleCall();
      }
    });
    rejectCall.addEventListener('click', () => {
      if (mode === 'single') {
        window._isCaller = false;
        rejectSingleCall();
      }
    });

    // Chat events
    sendChatBtn.addEventListener('click', sendChatMessage);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChatMessage(); });

    // ---- INIT ----
    const name = prompt('Enter your nickname:', 'User');
    if (name) myName = name.trim() || 'User';

    initPeer();

    window.addEventListener('beforeunload', () => {
      if (mode === 'single') cleanupSingle();
      else leaveGroup();
      if (peer) peer.destroy();
    });
  })();
</script>
</body>
</html>
