services:
  - type: web
    name: restreaam
    env: docker
    plan: free
    buildCommand: |
  curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp
  chmod +x yt-dlp
    startCommand: ""
    rootDir: public
    envVars:
      - key: RENDER_PHP_VERSION
        value: 8.1
